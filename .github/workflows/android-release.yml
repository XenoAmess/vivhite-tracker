name: Android Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v7
      with:
        # versionCode 依赖完整 git 历史（git rev-list --count HEAD），浅克隆会塌成 1
        fetch-depth: 0

    - name: Set up JDK 17
      uses: actions/setup-java@v5
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Decode signing key
      env:
        SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
      run: |
        if [ -n "$SIGNING_KEY" ]; then
          echo "$SIGNING_KEY" | base64 -d > app/release.keystore
          ls -la app/release.keystore
        else
          echo "SIGNING_KEY unavailable; release signing will fail" >&2
          exit 1
        fi

    - name: Build signed release APK
      run: ./gradlew assembleRelease
      env:
        SIGNING_KEY_FILE: "release.keystore"
        KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
        ALIAS: ${{ secrets.ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

    - name: Create Release
      uses: softprops/action-gh-release@v3
      with:
        files: |
          app/build/outputs/apk/release/app-release.apk
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
