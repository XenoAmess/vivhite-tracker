name: Android CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v7

    - name: Set up JDK 17
      uses: actions/setup-java@v5
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Decode debug signing key
      env:
        DEBUG_KEYSTORE_BASE64: ${{ secrets.DEBUG_KEYSTORE_BASE64 }}
      run: |
        if [ -n "$DEBUG_KEYSTORE_BASE64" ]; then
          echo "$DEBUG_KEYSTORE_BASE64" | base64 -d > app/debug.keystore
          ls -la app/debug.keystore
        else
          echo "DEBUG_KEYSTORE_BASE64 unavailable (dependabot PR context); Gradle will fall back to default debug key"
        fi

    - name: Run lint
      run: ./gradlew lintDebug

    - name: Run unit tests
      run: ./gradlew testDebugUnitTest

    - name: Build debug APK
      run: ./gradlew assembleDebug

    - name: Upload lint report
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: lint-report
        path: app/build/reports/lint-results-debug.html

    - name: Upload test reports
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: test-reports
        path: app/build/reports/tests/

    - name: Upload debug APK
      uses: actions/upload-artifact@v7
      with:
        name: debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
